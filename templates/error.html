<!DOCTYPE html>
<html>
<head>
    <title>Error - Erasmus Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Database Error</h4>
            </div>
            <div class="card-body">
                <h5 class="card-title">Hermes state.db not found</h5>
                <p class="card-text">{{ error }}</p>
                <p>Make sure Hermes Agent is installed and the state database exists at:</p>
                <code>~/.hermes/state.db</code>
                <hr>
                <a href="/" class="btn btn-primary">Retry</a>
            </div>
        </div>
    </div>
</body>
</html>
